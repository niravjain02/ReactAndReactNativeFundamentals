<svg xmlns="http://www.w3.org/2000/svg" width="375" height="780" viewBox="0 0 375 780">
  <!-- Background -->
  <rect width="375" height="780" fill="#F4F7FB"/>

  <!-- Nav header -->
  <rect width="375" height="88" fill="#FFFFFF"/>
  <line x1="0" y1="88" x2="375" y2="88" stroke="#E2E8F0" stroke-width="0.5"/>
  <!-- Back -->
  <text x="16" y="62" fill="#3157D5" font-family="system-ui,-apple-system,sans-serif" font-size="20">‹</text>
  <text x="30" y="62" fill="#3157D5" font-family="system-ui,-apple-system,sans-serif" font-size="15">User Directory</text>
  <!-- Screen title -->
  <text x="187" y="62" fill="#17213A" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" text-anchor="middle">Profile</text>
  <!-- Heart in header (filled = favorited) -->
  <text x="355" y="64" fill="#C2414A" font-family="system-ui,-apple-system,sans-serif" font-size="21" text-anchor="end">♥</text>

  <!-- Profile card -->
  <rect x="20" y="104" width="335" height="172" rx="24" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Avatar circle -->
  <circle cx="187" cy="158" r="40" fill="#3157D5"/>
  <!-- Avatar initials -->
  <text x="187" y="170" fill="#FFFFFF" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700" text-anchor="middle">EH</text>
  <!-- Name -->
  <text x="187" y="218" fill="#17213A" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">Ervin Howell</text>
  <!-- Username -->
  <text x="187" y="240" fill="#667085" font-family="system-ui,-apple-system,sans-serif" font-size="14" text-anchor="middle">@Antonette</text>
  <!-- Company pill -->
  <rect x="136" y="252" width="103" height="24" rx="12" fill="#E8EDFF"/>
  <text x="187" y="268" fill="#3157D5" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" text-anchor="middle">Deckow-Crist</text>

  <!-- Contact section -->
  <text x="20" y="306" fill="#17213A" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700">Contact</text>

  <!-- Contact card -->
  <rect x="20" y="318" width="335" height="138" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Email row -->
  <text x="36" y="344" fill="#667085" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600">EMAIL</text>
  <text x="36" y="362" fill="#17213A" font-family="system-ui,-apple-system,sans-serif" font-size="14">shanna@melissa.tv</text>
  <line x1="36" y1="372" x2="339" y2="372" stroke="#E2E8F0" stroke-width="0.5"/>
  <!-- Phone row -->
  <text x="36" y="390" fill="#667085" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600">PHONE</text>
  <text x="36" y="408" fill="#17213A" font-family="system-ui,-apple-system,sans-serif" font-size="14">010-692-6593 x09125</text>
  <line x1="36" y1="418" x2="339" y2="418" stroke="#E2E8F0" stroke-width="0.5"/>
  <!-- Website row -->
  <text x="36" y="436" fill="#667085" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600">WEBSITE</text>
  <text x="36" y="452" fill="#17213A" font-family="system-ui,-apple-system,sans-serif" font-size="14">anastasia.net</text>

  <!-- Work & location section -->
  <text x="20" y="490" fill="#17213A" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700">Work &amp; location</text>

  <!-- Work card -->
  <rect x="20" y="502" width="335" height="96" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Company row -->
  <text x="36" y="528" fill="#667085" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600">COMPANY</text>
  <text x="36" y="546" fill="#17213A" font-family="system-ui,-apple-system,sans-serif" font-size="14">Deckow-Crist</text>
  <line x1="36" y1="556" x2="339" y2="556" stroke="#E2E8F0" stroke-width="0.5"/>
  <!-- City row -->
  <text x="36" y="574" fill="#667085" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600">CITY</text>
  <text x="36" y="592" fill="#17213A" font-family="system-ui,-apple-system,sans-serif" font-size="14">Wisokyburgh</text>

  <!-- Remove from favorites button (danger style, because this user is favorited) -->
  <rect x="20" y="626" width="335" height="46" rx="12" fill="#FFF0F1"/>
  <text x="187" y="654" fill="#C2414A" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">♥  Remove from favorites</text>
</svg>
